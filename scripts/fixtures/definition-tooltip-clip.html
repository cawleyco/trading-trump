<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Definition tooltip clip repro</title>
  <style>
    :root {
      --color-border-strong: #444;
      --color-border-subtle: #333;
      --color-bg-elevated: #1b1f27;
      --color-bg-subtle: #151820;
      --color-text-primary: #f3f5f8;
      --color-text: #f3f5f8;
      --radius-sm: 6px;
      --shadow-card: 0 8px 24px rgba(0, 0, 0, 0.35);
      --font-sans: system-ui, sans-serif;
      --font-mono: ui-monospace, monospace;
    }
    body { font-family: var(--font-sans); background: #0d1016; color: var(--color-text); padding: 40px; }
    .intel-definition {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      width: fit-content;
      max-width: 100%;
      border-bottom: 1px dotted currentColor;
      cursor: help;
      outline: none;
    }
    .intel-definition::after {
      content: "?";
      display: inline-grid;
      place-items: center;
      width: 13px;
      height: 13px;
      border: 1px solid currentColor;
      border-radius: 50%;
      font-family: var(--font-mono);
      font-size: 9px;
      line-height: 1;
      opacity: 0.72;
      flex: 0 0 auto;
    }
    .intel-definition-popover {
      position: absolute;
      left: 0;
      bottom: calc(100% + 8px);
      z-index: 20;
      width: min(280px, calc(100vw - 48px));
      padding: 9px 10px;
      border: 1px solid var(--color-border-strong);
      border-radius: var(--radius-sm);
      background: var(--color-bg-elevated);
      color: var(--color-text-primary);
      box-shadow: var(--shadow-card);
      font-family: var(--font-sans);
      font-size: 0.78rem;
      font-weight: 500;
      line-height: 1.35;
      text-transform: none;
      white-space: normal;
      pointer-events: none;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 120ms ease, transform 120ms ease;
    }
    .intel-definition:hover .intel-definition-popover,
    .intel-definition.is-open .intel-definition-popover {
      opacity: 1;
      transform: translateY(0);
    }
    /* Mirrors client/src/index.css: open below inside overflow:auto tables. */
    .intel-table .intel-definition-popover {
      top: calc(100% + 8px);
      bottom: auto;
      transform: translateY(-4px);
    }
    .intel-table-wrap {
      overflow: auto;
      border: 1px solid var(--color-border-subtle);
      border-radius: var(--radius-sm);
      margin-top: 12px;
    }
    .intel-table { width: 100%; border-collapse: collapse; }
    .intel-table th {
      position: sticky;
      top: 0;
      background: var(--color-bg-subtle);
      text-align: left;
      padding: 10px;
    }
    .intel-table td { padding: 10px; }
  </style>
</head>
<body>
  <h1>Creator Dossier Index</h1>
  <div class="intel-table-wrap" id="wrap">
    <table class="intel-table">
      <thead>
        <tr>
          <th>
            <span class="intel-definition is-open" id="def">
              Channel
              <span class="intel-definition-popover" id="popover" role="tooltip">
                Tracked YouTube channel or creator.
              </span>
            </span>
          </th>
          <th>Alpha</th>
        </tr>
      </thead>
      <tbody>
        <tr><td>Altcoin Daily</td><td>42</td></tr>
        <tr><td>Other Channel</td><td>11</td></tr>
      </tbody>
    </table>
  </div>
  <pre id="out"></pre>
  <script>
    function measure() {
      const wrap = document.getElementById('wrap')
      const popover = document.getElementById('popover')
      const wrapRect = wrap.getBoundingClientRect()
      const popRect = popover.getBoundingClientRect()
      const style = getComputedStyle(popover)
      const clippedTop = popRect.top < wrapRect.top - 0.5
      const clippedLeft = popRect.left < wrapRect.left - 0.5
      const result = {
        opacity: style.opacity,
        popTop: popRect.top,
        popBottom: popRect.bottom,
        wrapTop: wrapRect.top,
        wrapBottom: wrapRect.bottom,
        clippedTop,
        clippedLeft,
        visible: style.opacity !== '0' && !clippedTop && !clippedLeft && popRect.height > 0,
      }
      document.getElementById('out').textContent = JSON.stringify(result, null, 2)
      document.title = result.visible ? 'PASS' : 'FAIL'
      window.__tooltipResult = result
      return result
    }
    measure()
  </script>
</body>
</html>
